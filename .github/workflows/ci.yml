name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 3 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    name: Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,docs]

      - name: Packaging check
        run: pip check

      - name: Python smoke tests
        run: |
          pytest -q \
            tests/test_api_hardening.py \
            tests/test_auth_fast_path.py \
            tests/test_rag_upload.py \
            tests/test_benchmark_api.py

      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci

      - name: Frontend contract tests
        working-directory: web
        run: npm run test:contracts

      - name: Frontend lint
        working-directory: web
        run: npm run lint

      - name: Frontend build
        working-directory: web
        run: npm run build

  full-test:
    name: Full Test
    if: github.event_name != 'pull_request'
    needs: smoke
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        with:
          fetch-depth: 0

      - uses: actions/checkout@v5
        if: matrix.os != 'ubuntu-latest' || matrix.python-version != '3.12'

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            pyproject.toml
            requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev,docs]
          pip install pytest-cov

      - name: Run tests
        run: |
          pytest -q --cov=app --cov=cli --cov=api --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
