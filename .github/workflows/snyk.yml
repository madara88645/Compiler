name: Snyk

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "41 4 * * 1"

permissions:
  contents: read

jobs:
  snyk:
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v7
        if: ${{ env.SNYK_TOKEN != '' }}
      - uses: actions/setup-python@v5
        if: ${{ env.SNYK_TOKEN != '' }}
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            pyproject.toml
      - name: Skip Snyk when token is unavailable
        if: ${{ env.SNYK_TOKEN == '' }}
        run: echo "SNYK_TOKEN is not set; skipping Snyk scan."
      - name: Install dependencies
        if: ${{ env.SNYK_TOKEN != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Setup Snyk
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@master

      - name: Run Snyk (requirements.txt)
        if: ${{ env.SNYK_TOKEN != '' }}
        run: snyk test --file=requirements.txt --package-manager=pip --severity-threshold=high

      - name: Run Snyk (pyproject.toml)
        if: ${{ env.SNYK_TOKEN != '' }}
        run: snyk test --file=pyproject.toml --package-manager=pip --severity-threshold=high
